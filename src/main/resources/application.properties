spring.application.name=solaris-api

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

server.port=${PORT:8080}

application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

google.client-id=${GOOGLE_CLIENT_ID:}

application.frontend.url=${FRONTEND_URL:http://localhost:5173}
application.email.resend-api-key=${RESEND_API_KEY:}
application.email.from=${EMAIL_FROM:no-reply@solarismanager.com}

# TusFacturas (AFIP via intermediary). Same URL for Plan API DEV and production.
application.fiscal.tusfacturas.base-url=${TUSFACTURAS_BASE_URL:https://www.tusfacturas.app/app/api/v2/facturacion/nuevo}

# AFIP native (homologation POC). Production URLs are Phase 2.
afip.homologation.enabled=${AFIP_HOMOLOGATION_ENABLED:false}
afip.homologation.wsaa-url=${AFIP_WSAA_URL:https://wsaahomo.afip.gov.ar/ws/services/LoginCms}
afip.homologation.wsfe-url=${AFIP_WSFE_URL:https://wswhomo.afip.gov.ar/wsfev1/service.asmx}
afip.cuit=${AFIP_CUIT:}
afip.punto-venta=${AFIP_PUNTO_VENTA:1}
afip.cert.path=${AFIP_CERT_PATH:}
afip.cert.password=${AFIP_CERT_PASSWORD:}
afip.cert.base64=${AFIP_CERT_BASE64:}
afip.integration-test.enabled=${AFIP_INTEGRATION_TEST_ENABLED:false}

# Verifactu native (AEAT). Endpoints from SistemaFacturacion.wsdl (tike v1.0).
verifactu.sandbox.enabled=${VERIFACTU_SANDBOX_ENABLED:false}
verifactu.sandbox.wsdl-url=${VERIFACTU_WSDL_URL:https://prewww2.aeat.es/static_files/common/internet/dep/aplicaciones/es/aeat/tikeV1.0/cont/ws/SistemaFacturacion.wsdl}
verifactu.sandbox.service-url=${VERIFACTU_SERVICE_URL:https://prewww1.aeat.es/wlpl/TIKE-CONT/ws/SistemaFacturacion/VerifactuSOAP}
verifactu.sandbox.service-sello-url=${VERIFACTU_SERVICE_SELLO_URL:https://prewww10.aeat.es/wlpl/TIKE-CONT/ws/SistemaFacturacion/VerifactuSOAP}
verifactu.sandbox.qr-validation-base-url=${VERIFACTU_QR_URL:https://prewww1.aeat.es/wlpl/TIKE-CONT/ValidarQR}
verifactu.production.wsdl-url=${VERIFACTU_PROD_WSDL_URL:https://www2.agenciatributaria.gob.es/static_files/common/internet/dep/aplicaciones/es/aeat/tikeV1.0/cont/ws/SistemaFacturacion.wsdl}
verifactu.production.service-url=${VERIFACTU_PROD_SERVICE_URL:https://www1.agenciatributaria.gob.es/wlpl/TIKE-CONT/ws/SistemaFacturacion/VerifactuSOAP}
verifactu.production.service-sello-url=${VERIFACTU_PROD_SERVICE_SELLO_URL:https://www10.agenciatributaria.gob.es/wlpl/TIKE-CONT/ws/SistemaFacturacion/VerifactuSOAP}
verifactu.nif=${VERIFACTU_NIF:}
verifactu.serie=${VERIFACTU_SERIE:1}
verifactu.cert.path=${VERIFACTU_CERT_PATH:}
verifactu.cert.password=${VERIFACTU_CERT_PASSWORD:}
verifactu.cert.base64=${VERIFACTU_CERT_BASE64:}
verifactu.software.name=${VERIFACTU_SOFTWARE_NAME:Solaris Manager}
verifactu.software.id=${VERIFACTU_SOFTWARE_ID:SO}
verifactu.software.version=${VERIFACTU_SOFTWARE_VERSION:1.0}
verifactu.software.installation-number=${VERIFACTU_INSTALLATION_NUMBER:1}
verifactu.signature.enabled=${VERIFACTU_SIGNATURE_ENABLED:true}
verifactu.integration-test.enabled=${VERIFACTU_INTEGRATION_TEST_ENABLED:false}

application.billing.mock-enabled=${BILLING_MOCK_ENABLED:true}
application.billing.session-token-expiration-ms=${BILLING_SESSION_TOKEN_EXPIRATION_MS:1800000}
application.billing.store-addon-price-ars=${BILLING_STORE_ADDON_PRICE_ARS:15000}
application.billing.store-addon-price-eur=${BILLING_STORE_ADDON_PRICE_EUR:15}
application.billing.provider=${BILLING_PROVIDER:MERCADOPAGO}
application.billing.api-public-url=${API_PUBLIC_URL:}
application.billing.mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
application.billing.mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}
application.billing.mercadopago.api-base-url=${MERCADOPAGO_API_BASE_URL:https://api.mercadopago.com}
application.billing.mercadopago.use-sandbox=${MERCADOPAGO_USE_SANDBOX:false}
application.billing.stripe.secret-key=${STRIPE_SECRET_KEY:}
application.billing.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}