spring.application.name=solaris-api

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

server.port=${PORT:8080}

application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

application.frontend.url=${FRONTEND_URL:http://localhost:5173}
application.email.resend-api-key=${RESEND_API_KEY:}
application.email.from=${EMAIL_FROM:no-reply@solarismanager.com}

# TusFacturas (AFIP via intermediary). Same URL for Plan API DEV and production.
application.fiscal.tusfacturas.base-url=${TUSFACTURAS_BASE_URL:https://www.tusfacturas.app/app/api/v2/facturacion/nuevo}

application.billing.mock-enabled=${BILLING_MOCK_ENABLED:true}
application.billing.store-addon-price-ars=${BILLING_STORE_ADDON_PRICE_ARS:15000}
application.billing.provider=${BILLING_PROVIDER:MERCADOPAGO}
application.billing.api-public-url=${API_PUBLIC_URL:}
application.billing.mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
application.billing.mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}
application.billing.mercadopago.api-base-url=${MERCADOPAGO_API_BASE_URL:https://api.mercadopago.com}
application.billing.mercadopago.use-sandbox=${MERCADOPAGO_USE_SANDBOX:false}